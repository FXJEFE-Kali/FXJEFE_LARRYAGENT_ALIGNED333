# ============================================================================
# Agent Larry — Docker Compose
# ----------------------------------------------------------------------------
# See DEPLOY.md for full documentation.
#
# Quick start (Ubuntu with GPU):
#   docker compose build
#   docker compose up -d ollama
#   docker compose exec ollama ollama pull llama3.2:3b
#   docker compose exec ollama ollama pull nomic-embed-text
#   docker compose run --rm -it agent
#
# Hardware profiles:
#   docker compose --profile tiny up -d        # MacBook M1 (8 GB)
#   docker compose --profile speed up -d       # ThinkPad Win11 (16 GB)
#   docker compose --profile dashboard up -d   # Web UI on :3777
#   docker compose --profile full up -d        # All services
# ============================================================================

services:

  # ──────────────────────────────────────────────────────────────────────
  # Ollama — local LLM inference server
  # ──────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: larry-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=10m
      - OLLAMA_HOST=0.0.0.0:11434
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    # --- GPU passthrough (Ubuntu 4060) ------------------------------------
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # ──────────────────────────────────────────────────────────────────────
  # Ollama — TINY profile (MacBook M1, no GPU block, strict mem limit)
  # ──────────────────────────────────────────────────────────────────────
  ollama-tiny:
    image: ollama/ollama:latest
    container_name: larry-ollama-tiny
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=2m
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "4"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles:
      - tiny

  # ──────────────────────────────────────────────────────────────────────
  # Ollama — SPEED profile (ThinkPad 16 GB, CPU only, moderate limits)
  # ──────────────────────────────────────────────────────────────────────
  ollama-speed:
    image: ollama/ollama:latest
    container_name: larry-ollama-speed
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=5m
      - OLLAMA_HOST=0.0.0.0:11434
      - OLLAMA_NUM_PARALLEL=2
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 10g
          cpus: "8"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles:
      - speed

  # ──────────────────────────────────────────────────────────────────────
  # Agent — interactive CLI (default service)
  # ──────────────────────────────────────────────────────────────────────
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: larry-agent:latest
    container_name: larry-agent
    stdin_open: true
    tty: true
    command: ["/app/agent_v2.py"]
    env_file:
      - .env
      - path: .env.secret
        required: false
    environment:
      - LARRY_HOME=/app
      - OLLAMA_URL=http://ollama:11434/api/chat
      - OLLAMA_HOST=http://ollama:11434
      - PYTHONUNBUFFERED=1
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
      - ./logs:/app/logs
      - ./exports:/app/exports
      - ./sandbox:/app/sandbox
      - ./.file_backups:/app/.file_backups
      - ./larry_config.json:/app/larry_config.json:ro
      - ./mcp.json:/app/mcp.json:ro
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "python -c 'from larry_paths import BASE_DIR; print(\"ok\")' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ──────────────────────────────────────────────────────────────────────
  # Dashboard — web UI (http://localhost:3777)
  # ──────────────────────────────────────────────────────────────────────
  dashboard:
    image: larry-agent:latest
    container_name: larry-dashboard
    command: ["/app/dashboard_hub.py"]
    env_file:
      - .env
      - path: .env.secret
        required: false
    environment:
      - LARRY_HOME=/app
      - OLLAMA_URL=http://ollama:11434/api/chat
      - OLLAMA_HOST=http://ollama:11434
    ports:
      - "3777:3777"
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
      - ./logs:/app/logs
      - ./exports:/app/exports
      - ./sandbox:/app/sandbox
      - ./larry_config.json:/app/larry_config.json:ro
      - ./mcp.json:/app/mcp.json:ro
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3777/ >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    profiles:
      - dashboard
      - full

  # ──────────────────────────────────────────────────────────────────────
  # Telegram bot — optional frontend
  # ──────────────────────────────────────────────────────────────────────
  telegram:
    image: larry-agent:latest
    container_name: larry-telegram
    command: ["/app/telegram_bot.py"]
    env_file:
      - .env
      - path: .env.secret
        required: false
    environment:
      - LARRY_HOME=/app
      - OLLAMA_URL=http://ollama:11434/api/chat
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./chroma_db:/app/chroma_db
      - ./data:/app/data
      - ./logs:/app/logs
      - ./larry_config.json:/app/larry_config.json:ro
      - ./mcp.json:/app/mcp.json:ro
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - telegram
      - full

  # ──────────────────────────────────────────────────────────────────────
  # n8n workflow automation
  # ──────────────────────────────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: larry-n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-larry-local}
    restart: unless-stopped
    profiles:
      - full

  # ──────────────────────────────────────────────────────────────────────
  # Postgres with pgvector (alternative RAG backend)
  # ──────────────────────────────────────────────────────────────────────
  postgres:
    image: ankane/pgvector:latest
    container_name: larry-postgres
    environment:
      POSTGRES_DB: larry_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PG_PASSWORD:-larry-local}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    profiles:
      - postgres
      - full

volumes:
  ollama_data:
    name: larry-ollama-data
  n8n_data:
    name: larry-n8n-data
  pg_data:
    name: larry-pg-data

networks:
  default:
    name: larry-network
